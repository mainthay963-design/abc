name: Build APK Windows (Release Version)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          packages: >
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;16.1.4479499
            cmake;3.10.2.4988404
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true

      - name: Enable Windows long paths
        shell: powershell
        run: |
          git config --system core.longpaths true
          reg add "HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f

      
      
      - name: Purge Old Library
        shell: powershell
        run: |
          Get-ChildItem -Path "app/src/main/jniLibs" -Filter "libsamp.so" -Recurse | Remove-Item -Force
          Get-ChildItem -Path "client" -Filter "libsamp.so" -Recurse | Remove-Item -Force

      - name: Patch Application.mk
        shell: powershell
        run: |
          $mk = @"
          APP_ABI := armeabi-v7a
          APP_PLATFORM := android-21
          APP_STL := c++_static
          APP_CPPFLAGS := -std=c++17
          APP_MODULES := samp
          "@
          Set-Content -Path "client/jni/Application.mk" -Value $mk

      - name: Patch Android.mk
        shell: powershell
        run: |
          $file = "client/jni/Android.mk"
          $content = Get-Content $file -Raw
          if ($content -notmatch "LOCAL_CPPFLAGS \+= -std=c\+\+17") {
              $content = $content -replace "include \$\(CLEAR_VARS\)", "include `$(CLEAR_VARS)`r`nLOCAL_CPPFLAGS += -std=c++17`r`nLOCAL_LDLIBS += -latomic"
          }
          Set-Content $file $content

      # 2. BUILD C++
      - name: Build libsamp.so
        shell: cmd
        run: |
          set NDK_PATH=%ANDROID_SDK_ROOT%\ndk\16.1.4479499
          cd client\jni
          call "%NDK_PATH%\ndk-build.cmd" ^
            NDK_PROJECT_PATH=. ^
            NDK_APPLICATION_MK=Application.mk ^
            APP_BUILD_SCRIPT=Android.mk ^
            APP_ABI=armeabi-v7a
          if errorlevel 1 exit /b 1

      # 3. TỰ TÌM VÀ COPY FILE (DÙ NÓ NẰM Ở ĐÂU)
      - name: Deploy Library to Android
        shell: powershell
        run: |
          $sourceFile = Get-ChildItem -Path "client" -Filter "libsamp.so" -Recurse | Select-Object -First 1
          if ($sourceFile) {
              Write-Host "Tìm thấy file tại: $($sourceFile.FullName)"
              $destDir = "app/src/main/jniLibs/armeabi-v7a"
              if (-not (Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force | Out-Null }
              Copy-Item -Path $sourceFile.FullName -Destination "$destDir/libsamp.so" -Force
              Write-Host "Copy thành công!"
          } else {
              Write-Error "KHÔNG TÌM THẤY libsamp.so TRONG THƯ MỤC CLIENT! Lỗi build C++ rồi."
              exit 1
          }

      - name: Clean Project
        shell: cmd
        run: call gradlew.bat clean

      - name: Build APK
        shell: cmd
        run: |
          call gradlew.bat assembleDebug --stacktrace
          if errorlevel 1 exit /b 1

      - name: Locate APK
        shell: powershell
        run: |
          $apk = Get-ChildItem -Path "app/build/outputs/apk" -Recurse -Filter *.apk | Sort-Object Length -Descending | Select-Object -First 1
          if ($apk) { echo "APK_PATH=$($apk.FullName)" >> $env:GITHUB_ENV } else { exit 1 }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SA-RP-Assets
          path: ${{ env.APK_PATH }}

      - name: Upload Files to Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: ${{ env.APK_PATH }}
          tag_name: build-${{ github.run_number }}
          name: SA-RP Build v${{ github.run_number }}
          body: "Build hoàn tất, file libsamp.so đã được cập nhật."
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
